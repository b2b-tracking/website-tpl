<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" th:content="${siteSeo != null ? siteSeo.description : ''}" content="查看我们的全部产品系列">
  <meta name="keywords" th:content="${siteSeo != null ? siteSeo.keywords : ''}" content="">
  <title th:with="currentMenu=${menus != null ? menus.^[target_url == 'products'] : null}"
         th:text="${(currentMenu != null ? currentMenu.menu_name + ' - ' : '') + (siteSeo != null ? siteSeo.title : site.name)}">产品中心</title>
  <link rel="icon" th:if="${site.favicon}" th:href="@{${site.favicon}}" type="image/x-icon">
  <link rel="stylesheet" th:href="@{'/css/style.css'}">
  <link rel="stylesheet" th:href="@{'/css/widget-posts.min.css'}">
  <link rel="stylesheet" th:href="@{'/css/navbar-footer.css'}">
  <link rel="stylesheet" th:href="@{'/css/animations.css'}">
  <style>
    body {
      background: #f5f5f5;
    }

    /* 确保页脚样式优先 */
    .footer {
      background: #2c3e50;
      color: #ecf0f1;
      padding: 3rem 2rem 1.5rem;
      display: block;
    }

    /* Hero Banner */
    .products-banner {
      position: relative;
      height: 400px;
      background: linear-gradient(135deg, #7FA8DA 0%, #9BC4E8 50%, #C4D9EC 100%);
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .products-banner::before {
      content: 'PRODUCTS';
      position: absolute;
      top: 50%;
      right: -10%;
      transform: translateY(-50%);
      font-size: 20rem;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: -0.05em;
      z-index: 1;
      line-height: 1;
    }

    .products-banner-content {
      position: relative;
      z-index: 2;
      text-align: left;
      color: white;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 0 4rem;
    }

    .products-banner-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      letter-spacing: 0;
    }

    .products-banner-subtitle {
      font-size: 1rem;
      opacity: 1;
      letter-spacing: 0;
      font-weight: 300;
    }

    /* 内容区域 */
    .content-section {
      padding: 4rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* 分类筛选 */
    .category-filter {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 3rem;
    }

    .category-filter-btn {
      padding: 0.6rem 1.8rem;
      border: 1px solid #333;
      border-radius: 25px;
      text-decoration: none;
      color: #333;
      transition: all 0.3s;
      background: white;
      font-weight: 400;
      font-size: 0.9rem;
    }

    .category-filter-btn:hover {
      background: var(--primary-blue);
      color: white;
      border-color: var(--primary-blue);
    }

    .category-filter-btn.active {
      background: var(--primary-blue);
      border-color: var(--primary-blue);
      color: white;
    }

    /* 产品网格 */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 2.5rem;
    }

    .product-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }

    .product-card-image {
      width: 100%;
      padding-bottom: 100%;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #f8f9fa;
      position: relative;
      overflow: hidden;
    }

    .product-card-image::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(to top, rgba(248,249,250,0.8), transparent);
    }

    .product-card-image::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(to top, rgba(248,249,250,0.8), transparent);
    }

    .product-card-content {
      padding: 2rem 1.8rem;
    }

    .product-card-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .product-card-desc {
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    .product-card-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary-blue);
      font-weight: 500;
      text-decoration: none;
      transition: gap 0.3s ease;
    }

    .product-card-btn:hover {
      gap: 1rem;
    }


    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 4rem 0;
      grid-column: 1 / -1;
    }

    .empty-state p {
      color: var(--text-light);
      font-size: 1.1rem;
    }

    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-top: 3rem;
    }

    .pagination-btn {
      padding: 0.5rem 1rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      text-decoration: none;
      color: #333;
      background: white;
      transition: all 0.3s;
      min-width: 40px;
      text-align: center;
      display: inline-block;
    }

    .pagination-btn:hover {
      background: var(--primary-blue);
      color: white;
      border-color: var(--primary-blue);
    }

    .pagination-btn.active {
      background: var(--primary-blue);
      color: white;
      border-color: var(--primary-blue);
      font-weight: 600;
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      body {
        background: #f5f5f5;
      }

      .products-banner {
        height: 250px;
      }

      .products-banner::before {
        font-size: 12rem;
      }

      .products-banner-content {
        padding: 0 2rem;
      }

      .products-banner-title {
        font-size: 1.8rem;
      }

      .products-banner-subtitle {
        font-size: 0.9rem;
      }

      .products-grid {
        grid-template-columns: 1fr;
      }

      .content-section {
        padding: 2rem 1rem;
      }

      .category-filter {
        gap: 0.8rem;
      }

      .category-filter-btn {
        padding: 0.5rem 1.2rem;
        font-size: 0.85rem;
      }
    }
  </style>
</head>

<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a th:href="@{'/' + ${lang} + '/'}" class="logo">
        <img th:if="${site.logo}" th:src="@{${site.logo}}" th:alt="${site.name}"
          style="height: 40px; vertical-align: middle;">
        <span th:unless="${site.logo}" th:text="${site.name}"></span>
      </a>
      <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">☰</button>
      <ul class="nav-menu" id="navMenu">
        <li th:each="menu : ${menus}">
          <a th:href="@{'/' + ${lang} + '/' + ${menu.target_url}}" class="nav-link" th:text="${menu.menu_name}"></a>
        </li>
        <li class="lang-switcher">
          <button type="button" class="lang-btn" th:classappend="${lang == 'zh'} ? 'active'"
            onclick="switchLanguage('zh'); return false;">中文</button>
          <button type="button" class="lang-btn" th:classappend="${lang == 'en'} ? 'active'"
            onclick="switchLanguage('en'); return false;">EN</button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Hero Banner -->
  <section class="products-banner">
    <div class="products-banner-content">
      <h1 class="products-banner-title" data-i18n="products.title">产品中心</h1>
      <p class="products-banner-subtitle" data-i18n="products.subtitle">为您提供优质的产品和服务</p>
    </div>
  </section>

  <!-- 产品列表 -->
  <section class="content-section">
    <!-- 分类筛选 -->
    <div class="category-filter">
      <a th:href="@{'/' + ${lang} + '/products'}"
         th:classappend="${selectedCategory == null} ? 'active'"
         class="category-filter-btn"
         data-i18n="products.allProducts">
        全部产品
      </a>
      <a th:each="cat : ${categories}"
         th:href="@{'/' + ${lang} + '/products?category=' + ${cat.id}}"
         th:classappend="${selectedCategory != null && selectedCategory == cat.id} ? 'active'"
         class="category-filter-btn"
         th:text="${cat.name}">
        分类
      </a>
    </div>

    <!-- 产品网格 -->
    <div class="products-grid">
      <div th:each="product, iterStat : ${products}" class="product-card"
           th:onclick="'window.location.href=\'' + @{'/' + ${lang} + '/products/' + ${product.id}} + '\''"
           style="cursor: pointer;">
        <div class="product-card-image"
             th:style="${product.mainImage} ? 'background-image: url(' + ${product.mainImage} + ');' : 'background: linear-gradient(135deg, hsl(' + ${(iterStat.index * 60) % 360} + ', 70%, 60%) 0%, hsl(' + ${((iterStat.index * 60) + 30) % 360} + ', 70%, 50%) 100%);'">
        </div>
        <div class="product-card-content">
          <h3 class="product-card-title" th:text="${product.name}">产品名称</h3>
          <p class="product-card-desc" th:text="${product.shortDescription}">产品简介</p>
          <a class="product-card-btn" data-i18n="products.viewDetails">了解详情 →</a>
        </div>
      </div>

      <!-- 空状态 -->
      <div th:if="${products == null || products.isEmpty()}" class="empty-state">
        <p data-i18n="products.noProducts">暂无产品</p>
      </div>
    </div>

    <!-- 分页 -->
    <div th:if="${totalPages > 1}" class="pagination">
      <a th:if="${currentPage > 1}"
         th:href="${selectedCategory != null} ? @{'/' + ${lang} + '/products?page=' + ${currentPage - 1} + '&category=' + ${selectedCategory}} : @{'/' + ${lang} + '/products?page=' + ${currentPage - 1}}"
         class="pagination-btn">&lt;</a>

      <span th:each="i : ${#numbers.sequence(1, totalPages)}"
            th:if="${i == 1 || i == totalPages || (i >= currentPage - 2 && i <= currentPage + 2)}">
        <a th:if="${i != currentPage}"
           th:href="${selectedCategory != null} ? @{'/' + ${lang} + '/products?page=' + ${i} + '&category=' + ${selectedCategory}} : @{'/' + ${lang} + '/products?page=' + ${i}}"
           class="pagination-btn"
           th:text="${i}">1</a>
        <span th:if="${i == currentPage}"
              class="pagination-btn active"
              th:text="${i}">1</span>
      </span>

      <a th:if="${currentPage < totalPages}"
         th:href="${selectedCategory != null} ? @{'/' + ${lang} + '/products?page=' + ${currentPage + 1} + '&category=' + ${selectedCategory}} : @{'/' + ${lang} + '/products?page=' + ${currentPage + 1}}"
         class="pagination-btn">&gt;</a>
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-column">
        <h4 th:text="${siteI18n != null ? siteI18n.site_name : site.name}">CLOUPOR</h4>
        <p th:text="${siteI18n != null ? siteI18n.description : ''}"></p>
      </div>

      <div class="footer-column">
        <h4 data-i18n="nav.about">关于我们</h4>
        <a th:href="@{'/' + ${lang} + '/about'}" data-i18n="footer.companyProfile">公司简介</a>
      </div>

      <div class="footer-column">
        <h4 data-i18n="products.title">产品中心</h4>
        <a th:each="category : ${categories}" th:href="@{'/' + ${lang} + '/products?category=' + ${category.id}}"
          th:text="${category.name}">产品分类</a>
        <a href="#" th:if="${categories.isEmpty()}" data-i18n="footer.allProducts">全部产品</a>
      </div>

      <div class="footer-column">
        <h4 data-i18n="footer.quickLinks">快速链接</h4>
        <a th:href="@{'/' + ${lang} + '/news'}" data-i18n="nav.news">新闻资讯</a>
        <a th:href="@{'/' + ${lang} + '/contact'}" data-i18n="nav.contact">联系我们</a>
      </div>

      <!-- <div class="footer-column" th:if="${contact}">
        <h4 data-i18n="contact.title">联系我们</h4>
        <p th:if="${contact.address}">📍 <span th:text="${contact.address}">地址</span></p>
        <p th:if="${contact.phone}">📞 <span th:text="${contact.phone}">电话</span></p>
        <p th:if="${contact.email}">✉️ <span th:text="${contact.email}">邮箱</span></p>
      </div> -->
    </div>

    <div class="footer-bottom">
      <p>&copy; <span class="year"></span> <span th:text="${siteI18n != null ? siteI18n.site_name : site.name}">CLOUPOR</span>. <span
          data-i18n="footer.allRightsReserved">保留所有权利</span></p>
      <p th:if="${site.icpNumber}" th:text="${site.icpNumber}"></p>
    </div>
  </footer>

  <!-- 返回顶部 -->
  <div class="back-to-top" onclick="scrollToTop()">↑</div>

  <!-- Scripts -->
  <script th:src="@{'/js/i18n.js'}"></script>
  <script th:src="@{'/js/main.js'}"></script>
  <script th:src="@{'/js/animations.js'}"></script>

  <script>
    window.onload = function () {
      document.querySelector('.year').textContent = new Date().getFullYear();

      // 确保语言切换按钮可用 - 添加备用事件监听
      const langButtons = document.querySelectorAll('.lang-btn');
      langButtons.forEach(function(button) {
        // 移除已有的点击事件（如果有的话）
        const clone = button.cloneNode(true);
        button.parentNode.replaceChild(clone, button);

        // 添加新的点击事件
        clone.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          const lang = this.textContent.trim() === '中文' ? 'zh' : 'en';
          console.log('Language button clicked:', lang);
          switchLanguage(lang);
        });
      });
    };

    // 移动端菜单切换
    function toggleMobileMenu() {
      const navMenu = document.getElementById('navMenu');
      navMenu.classList.toggle('active');
    }

    // 语言切换
    function switchLanguage(lang) {
      try {
        const currentPath = window.location.pathname;
        let pathParts = currentPath.split('/').filter(p => p);

        // 如果第一个部分是语言代码，替换它
        if (pathParts.length > 0 && (pathParts[0] === 'zh' || pathParts[0] === 'en')) {
          pathParts[0] = lang;
        } else {
          // 否则在前面添加语言代码
          pathParts.unshift(lang);
        }

        const search = window.location.search || '';
        const newUrl = '/' + pathParts.join('/') + search;

        console.log('Switching language to:', lang, 'New URL:', newUrl);
        window.location.href = newUrl;
      } catch (error) {
        console.error('Language switch error:', error);
        // 备用方案：直接重新加载页面
        window.location.reload();
      }
    }

    // 返回顶部
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 返回顶部按钮显示/隐藏
    window.addEventListener('scroll', function () {
      const backToTop = document.querySelector('.back-to-top');
      if (window.scrollY > 300) {
        backToTop.classList.add('show');
      } else {
        backToTop.classList.remove('show');
      }
    });
  </script>
</body>

</html>
