<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" th:content="${siteSeo.description ?: ''}" content="">
  <meta name="keywords" th:content="${siteSeo.keywords ?: ''}" content="">
  <title th:text="${siteSeo.title ?: site.name}"></title>
  <link rel="icon" th:if="${site.favicon}" th:href="@{${site.favicon}}" type="image/x-icon">
  <link rel="stylesheet" th:href="@{'/css/style.css'}">
  <link rel="stylesheet" th:href="@{'/css/navbar-footer.css'}">
  <link rel="stylesheet" th:href="@{'/css/animations.css'}">
  <style>
    /* 基础样式 */

    /* Hero Banner */
    .hero-banner {
      position: relative;
      min-height: 500px;
      background: linear-gradient(135deg, var(--light-blue) 0%, #d0e8f2 100%);
      overflow: hidden;
    }

    .banner-slide {
      display: none;
      min-height: 500px;
      position: relative;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .banner-slide.active {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .banner-content {
      max-width: 1200px;
      width: 100%;
      padding: 2rem 2rem;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .banner-content h1{
      text-shadow: 2px 2px 8px rgba(74, 144, 226, 0.5);
    }
    .banner-title {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--primary-blue);
      margin-bottom: 1.5rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .banner-subtitle {
      font-size: 1.3rem;
      color: #2c5282;
      text-shadow: unset;
      margin-bottom: 2.5rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .banner-brand {
      font-size: 6rem;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.9);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-top: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 2.5rem;
      background: transparent;
      color: var(--text-dark);
      border: 2px solid var(--text-dark);
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
      font-size: 0.95rem;
    }

    .btn:hover {
      background: var(--primary-blue);
      border-color: var(--primary-blue);
      color: white;
      transform: translateY(-2px);
    }

    .banner-dots {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 3;
    }

    .banner-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: all 0.3s;
    }

    .banner-dot.active {
      background: var(--primary-blue);
      width: 30px;
      border-radius: 5px;
    }

    /* 轮播箭头 */
    .banner-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 10;
      backdrop-filter: blur(5px);
      user-select: none;
    }

    .banner-arrow:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: translateY(-50%) scale(1.1);
    }

    .banner-arrow-left {
      left: 2rem;
    }

    .banner-arrow-right {
      right: 2rem;
    }

    /* 内容区块 */
    .content-section {
      padding: 4rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .content-section-full {
      padding: 5rem 2rem;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      margin-bottom: 5rem;
      padding: 2rem 0;
    }

    .content-image {
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      position: relative;
    }

    .content-image::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(74, 144, 226, 0.05) 0%, rgba(74, 144, 226, 0) 100%);
      pointer-events: none;
    }

    .content-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .content-text h2 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text-dark);
      line-height: 1.3;
      position: relative;
      padding-bottom: 1rem;
    }

    .content-text h2::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, var(--primary-blue) 0%, var(--light-blue) 100%);
      border-radius: 2px;
    }

    .content-text h3 {
      font-size: 1.5rem;
      color: var(--primary-blue);
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    .content-text p {
      color: var(--text-light);
      margin-bottom: 2.5rem;
      line-height: 1.9;
      font-size: 1.1rem;
    }

    .content-text .btn {
      padding: 1rem 2.8rem;
      font-size: 1rem;
      box-shadow: 0 8px 24px rgba(74, 144, 226, 0.2);
    }

    .content-text .btn:hover {
      box-shadow: 0 12px 32px rgba(74, 144, 226, 0.3);
      transform: translateY(-2px);
    }

    /* 新闻动态 */
    .news-section {
      background: linear-gradient(to bottom, #ffffff 0%, #f8f9fa 50%, #f8f9fa 100%);
      padding: 4rem 2rem 5rem;
    }

    .section-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .section-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: var(--primary-blue);
      margin: 1rem auto 0;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .news-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      transition: all 0.3s;
      cursor: pointer;
    }

    .news-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .news-image {
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .news-info {
      padding: 1.5rem;
    }

    .news-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--text-dark);
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .news-excerpt {
      color: var(--text-light);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .news-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .news-read-more {
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 600;
    }

    /* 动画效果 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 滚动触发动画 */
    .animate-on-scroll {
      opacity: 0;
      transition: none;
    }

    .animate-on-scroll.animated {
      animation-duration: 0.8s;
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    }

    .fade-in-up {
      animation-name: fadeInUp;
    }

    .fade-in-left {
      animation-name: fadeInLeft;
    }

    .fade-in-right {
      animation-name: fadeInRight;
    }

    .scale-in {
      animation-name: scaleIn;
    }

    /* Banner 动画 */
    .banner-slide {
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      pointer-events: none;
    }

    .banner-slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .banner-content > * {
      animation: fadeInUp 1s ease-out backwards;
    }

    .banner-title {
      animation-delay: 0.2s;
    }

    .banner-subtitle {
      animation-delay: 0.4s;
    }

    .banner-content .btn {
      animation-delay: 0.6s;
    }

    .banner-brand {
      animation: scaleIn 1.2s ease-out backwards;
      animation-delay: 0.8s;
    }

    /* 导航栏动画 */
    .navbar {
      animation: slideDown 0.6s ease-out;
    }

    /* 悬停动画增强 */
    .news-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .content-image {
      transition: transform 0.4s ease;
    }

    .content-image:hover {
      transform: translateY(-8px);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.12);
    }

    /* 按钮动画 */
    .btn {
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      .banner-brand {
        font-size: 3rem;
      }

      .banner-title {
        font-size: 1.8rem;
      }

      /* 移动端轮播箭头 */
      .banner-arrow {
        width: 40px;
        height: 40px;
        font-size: 1.5rem;
      }

      .banner-arrow-left {
        left: 1rem;
      }

      .banner-arrow-right {
        right: 1rem;
      }
    }

    /* 产品展示区 */
    .products-showcase-section {
      padding: 5rem 2rem 4rem;
      background: #f8f9fa;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 2.5rem;
      max-width: 1400px;
      margin: 0 auto;
      padding: 3rem 0;
    }

    .product-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }

    .product-card-image {
      width: 100%;
      padding-bottom: 100%;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #f8f9fa;
      position: relative;
      overflow: hidden;
    }

    .product-card-image::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(to top, rgba(248,249,250,0.8), transparent);
    }

    .product-card-content {
      padding: 2rem 1.8rem;
    }

    .product-card-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .product-card-desc {
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    .product-card-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary-blue);
      font-weight: 500;
      text-decoration: none;
      transition: gap 0.3s ease;
    }

    .product-card-btn:hover {
      gap: 1rem;
    }

    .section-subtitle {
      text-align: center;
      color: var(--text-light);
      font-size: 1.05rem;
      margin-top: 0.8rem;
      font-weight: 400;
    }

    /* 产品分隔线 */
    .product-divider {
      height: 1px;
      background: linear-gradient(to right, transparent 0%, #e5e7eb 50%, transparent 100%);
      margin: 3rem auto;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a th:href="@{'/' + ${lang} + '/'}" class="logo">
        <img th:if="${site.logo}" th:src="@{${site.logo}}" th:alt="${site.name}" style="height: 40px;">
        <span th:unless="${site.logo}" th:text="${site.name}">品牌名称</span>
      </a>
      <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">☰</button>
      <ul class="nav-menu" id="navMenu">
         <li th:each="menu : ${menus}">
          <a th:href="@{'/' + ${lang} + '/' + ${menu.target_url}}" class="nav-link"
             th:text="${menu.menu_name}">菜单</a>
        </li>
        <!-- 备用菜单 -->
        <!-- <li th:if="${menus.isEmpty()}">
          <a th:href="@{'/' + ${lang} + '/about'}" class="nav-link" data-i18n="nav.about">关于我们</a>
        </li>
        <li th:if="${menus.isEmpty()}">
          <a th:href="@{'/' + ${lang} + '/innovation'}" class="nav-link" data-i18n="nav.innovation">科创动态</a>
        </li>
        <li th:if="${menus.isEmpty()}">
          <a th:href="@{'/' + ${lang} + '/technology'}" class="nav-link" data-i18n="nav.technology">技术方案</a>
        </li>
        <li th:if="${menus.isEmpty()}">
          <a th:href="@{'/' + ${lang} + '/news'}" class="nav-link" data-i18n="nav.news">新闻动态</a>
        </li>
        <li th:if="${menus.isEmpty()}">
          <a th:href="@{'/' + ${lang} + '/contact'}" class="nav-link" data-i18n="nav.contact">联系我们</a>
        </li> -->
        <li class="lang-switcher">
          <button type="button" class="lang-btn" th:classappend="${lang == 'zh'} ? 'active'" onclick="switchLanguage('zh'); return false;">中文</button>
          <button type="button" class="lang-btn" th:classappend="${lang == 'en'} ? 'active'" onclick="switchLanguage('en'); return false;">EN</button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Hero Banner -->
  <section class="hero-banner">
    <!-- 动态Banner -->
    <div th:each="banner, iterStat : ${banners}"
         class="banner-slide"
         th:classappend="${iterStat.first} ? 'active'"
         th:style="${banner.image_url} ? 'background-image: url(' + @{${banner.image_url}} + ');' : ''">
      <div class="banner-content">
        <h1 class="banner-title" th:text="${banner.title}">电子雾化设备及新型烟草产品</h1>
        <p class="banner-subtitle" th:text="${banner.subtitle}">一站式服务引领者</p>
      </div>
    </div>
    <!-- 默认Banner（当没有后端数据时） -->
    <div class="banner-slide active" th:if="${banners == null || #lists.isEmpty(banners)}">
      <div class="banner-content">
        <h1 class="banner-title" data-i18n="hero.defaultTitle">电子雾化设备及新型烟草产品</h1>
        <p class="banner-subtitle" data-i18n="hero.defaultSubtitle">一站式服务引领者</p>
        <a href="#services" class="btn" data-i18n="hero.learnMore">探索更多</a>
        <div class="banner-brand" th:text="${site.name}">BRAND</div>
      </div>
    </div>

    <!-- 左右箭头控制 -->
    <div class="banner-arrow banner-arrow-left" onclick="prevSlide()" th:if="${banners.size() > 1}">‹</div>
    <div class="banner-arrow banner-arrow-right" onclick="nextSlide()" th:if="${banners.size() > 1}">›</div>

    <!-- 轮播导航点 -->
    <div class="banner-dots" th:if="${banners.size() > 1}">
      <span th:each="banner, iterStat : ${banners}"
            class="banner-dot"
            th:classappend="${iterStat.first} ? 'active'"
            th:onclick="'goToSlide(' + ${iterStat.index} + ')'"></span>
    </div>
  </section>

  <!-- 产品展示区 -->
  <section class="products-showcase-section" id="products">
    <div class="content-section">
      <div class="section-header animate-on-scroll fade-in-up">
        <h2 class="section-title" data-i18n="products.title">核心产品</h2>
        <p class="section-subtitle" data-i18n="products.subtitle">专业品质，精工制造</p>
      </div>

      <div class="products-grid">
        <div class="product-card animate-on-scroll fade-in-up"
             th:each="product, iterStat : ${products}"
             th:if="${iterStat.index < 6}"
             th:onclick="'window.location.href=\'' + @{'/' + ${lang} + '/products/' + ${product.id}} + '\''"
             style="cursor: pointer;">
          <div class="product-card-image"
               th:style="${product.mainImage} ? 'background-image: url(' + ${product.mainImage} + ');' : 'background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);'">
          </div>
          <div class="product-card-content">
            <h3 class="product-card-title" th:text="${product.name}">产品名称</h3>
            <p class="product-card-desc" th:text="${product.shortDescription}">产品描述</p>
            <a class="product-card-btn" data-i18n="products.viewDetails">了解详情 →</a>
          </div>
        </div>
      </div>

      <div style="text-align: center; margin-top: 2.5rem;" class="animate-on-scroll fade-in-up">
        <a th:href="@{'/' + ${lang} + '/products'}" class="btn" data-i18n="services.viewAll">查看全部产品</a>
      </div>
    </div>
  </section>


  <!-- 新闻动态 -->
  <section class="news-section">
    <div class="content-section">
      <div class="section-header animate-on-scroll fade-in-up">
        <h2 class="section-title" data-i18n="news.title">新闻动态</h2>
      </div>

      <div class="news-grid">
        <div class="news-card animate-on-scroll scale-in" th:each="newsItem, iterStat : ${news}"
             th:onclick="'window.location.href=\'' + @{'/' + ${lang} + '/news/' + ${newsItem.id}} + '\''">
          <div class="news-image"
               th:if="${newsItem.cover_image}"
               th:style="'background-image: url(' + @{${newsItem.cover_image}} + '); background-size: contain; background-position: center; background-repeat: no-repeat;'">
          </div>
          <div class="news-image" th:unless="${newsItem.cover_image}"
               th:style="'background: linear-gradient(135deg, hsl(' + ${(iterStat.index * 120) % 360} + ', 70%, 60%) 0%, hsl(' + ${((iterStat.index * 120) + 50) % 360} + ', 70%, 50%) 100%);'">
            <span>📰</span>
          </div>
          <div class="news-info">
            <h3 class="news-title" th:text="${newsItem.title}">新闻标题</h3>
            <p class="news-excerpt" th:text="${newsItem.summary}">新闻摘要内容</p>
            <div class="news-meta">
              <span class="news-date">📅 <span class="utc-date" th:attr="data-utc=${newsItem.publish_time}" th:text="${#temporals.format(newsItem.publish_time, 'yyyy-MM-dd')}">2026-01-10</span></span>
              <a th:href="@{'/' + ${lang} + '/news/' + ${newsItem.id}}" class="news-read-more" data-i18n="news.readMore">查看更多</a>
            </div>
          </div>
        </div>
      </div>

      <div style="text-align: center; margin-top: 3rem;" class="animate-on-scroll fade-in-up">
        <a th:href="@{'/' + ${lang} + '/news'}" class="btn" data-i18n="news.viewAll">查看全部新闻</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-column">
        <h3 th:text="${siteI18n != null ? siteI18n.site_name : site.name}">ManufacturePro</h3>
        <p th:text="${siteI18n.description ?: ''}" ></p>
      </div>

      <div class="footer-column">
        <h4 data-i18n="nav.about">关于我们</h4>
        <a th:href="@{'/' + ${lang} + '/about'}" data-i18n="footer.companyProfile">公司简介</a>
        <!-- <a th:href="@{'/' + ${lang} + '/technology'}" data-i18n="footer.technology">技术实力</a> -->
      </div>

      <div class="footer-column">
        <h4 data-i18n="products.title">产品中心</h4>
        <a th:each="category : ${categories}"
           th:href="@{'/' + ${lang} + '/products?category=' + ${category.id}}"
           th:text="${category.name}">产品分类</a>
        <a href="#" th:if="${categories.isEmpty()}" data-i18n="footer.allProducts">全部产品</a>
      </div>

      <div class="footer-column">
        <h4 data-i18n="footer.quickLinks">快速链接</h4>
        <a th:href="@{'/' + ${lang} + '/news'}" data-i18n="nav.news">新闻动态</a>
        <a th:href="@{'/' + ${lang} + '/contact'}" data-i18n="nav.contact">联系我们</a>
      </div>

      <!-- <div class="footer-column" th:if="${contact}">
        <h4 data-i18n="contact.title">联系我们</h4>
        <p th:if="${contact.address}">📍 <span th:text="${contact.address}">地址</span></p>
        <p th:if="${contact.phone}">📞 <span th:text="${contact.phone}">电话</span></p>
        <p th:if="${contact.email}">✉️ <span th:text="${contact.email}">邮箱</span></p>
      </div> -->
    </div>

    <div class="footer-bottom">
      <p>&copy; <span class="year"></span> <span th:text="${site.name ?: 'CLOUPOR'}">CLOUPOR</span>. <span data-i18n="footer.allRightsReserved">保留所有权利</span></p>
      <p th:if="${site.icpNumber}" th:text="${site.icpNumber}"></p>
    </div>
  </footer>

  <!-- 返回顶部 -->
  <div class="back-to-top" onclick="scrollToTop()">↑</div>

  <!-- Scripts -->
  <script th:src="@{'/js/i18n.js'}"></script>
  <script th:src="@{'/js/main.js'}"></script>
  <script th:src="@{'/js/animations.js'}"></script>

  <script>
    window.onload = function() {
      document.querySelector('.year').textContent = new Date().getFullYear();

      // 确保语言切换按钮可用 - 添加备用事件监听
      const langButtons = document.querySelectorAll('.lang-btn');
      langButtons.forEach(function(button) {
        // 移除已有的点击事件（如果有的话）
        const clone = button.cloneNode(true);
        button.parentNode.replaceChild(clone, button);

        // 添加新的点击事件
        clone.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          const lang = this.textContent.trim() === '中文' ? 'zh' : 'en';
          console.log('Language button clicked:', lang);
          switchLanguage(lang);
        });
      });
    };
    // Banner轮播
    let currentSlide = 0;
    const slides = document.querySelectorAll('.banner-slide');
    const dots = document.querySelectorAll('.banner-dot');

    function goToSlide(n) {
      if (slides.length === 0) return;
      slides[currentSlide].classList.remove('active');
      if (dots.length > 0) {
        dots[currentSlide].classList.remove('active');
      }
      currentSlide = n % slides.length;
      slides[currentSlide].classList.add('active');
      if (dots.length > 0) {
        dots[currentSlide].classList.add('active');
      }
    }

    function prevSlide() {
      if (slides.length === 0) return;
      const prevIndex = (currentSlide - 1 + slides.length) % slides.length;
      goToSlide(prevIndex);
    }

    function nextSlide() {
      if (slides.length > 1) {
        goToSlide((currentSlide + 1) % slides.length);
      }
    }

    if (slides.length > 1) {
      setInterval(nextSlide, 5000);
    }

    // 移动端菜单切换
    function toggleMobileMenu() {
      const navMenu = document.getElementById('navMenu');
      navMenu.classList.toggle('active');
    }

    // 语言切换
    function switchLanguage(lang) {
      try {
        const currentPath = window.location.pathname;
        let pathParts = currentPath.split('/').filter(p => p);

        // 如果第一个部分是语言代码，替换它
        if (pathParts.length > 0 && (pathParts[0] === 'zh' || pathParts[0] === 'en')) {
          pathParts[0] = lang;
        } else {
          // 否则在前面添加语言代码
          pathParts.unshift(lang);
        }

        const search = window.location.search || '';
        const newUrl = '/' + pathParts.join('/') + (search?search:'/');

        console.log('Switching language to:', lang, 'New URL:', newUrl);
        window.location.href = newUrl;
      } catch (error) {
        console.error('Language switch error:', error);
        // 备用方案：直接重新加载页面
        window.location.reload();
      }
    }

    // 返回顶部
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 返回顶部按钮显示/隐藏
    window.addEventListener('scroll', function() {
      const backToTop = document.querySelector('.back-to-top');
      if (window.scrollY > 300) {
        backToTop.classList.add('show');
      } else {
        backToTop.classList.remove('show');
      }
    });

    // 平滑滚动到锚点
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        const href = this.getAttribute('href');
        if (href !== '#' && href !== '#!') {
          e.preventDefault();
          const target = document.querySelector(href);
          if (target) {
            target.scrollIntoView({ behavior: 'smooth' });
          }
        }
      });
    });

    // 滚动触发动画
    const animateElements = document.querySelectorAll('.animate-on-scroll');

    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -50px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, index) => {
        if (entry.isIntersecting) {
          // 添加延迟以创建连续动画效果
          setTimeout(() => {
            entry.target.classList.add('animated');
            if (entry.target.classList.contains('fade-in-up')) {
              entry.target.classList.add('fade-in-up');
            } else if (entry.target.classList.contains('fade-in-left')) {
              entry.target.classList.add('fade-in-left');
            } else if (entry.target.classList.contains('fade-in-right')) {
              entry.target.classList.add('fade-in-right');
            } else if (entry.target.classList.contains('scale-in')) {
              entry.target.classList.add('scale-in');
            }
          }, index * 100);
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);

    animateElements.forEach(element => {
      observer.observe(element);
    });

    // 键盘控制轮播（左右箭头键）
    document.addEventListener('keydown', function(e) {
      if (slides.length <= 1) return;
      if (e.key === 'ArrowLeft') {
        prevSlide();
      } else if (e.key === 'ArrowRight') {
        nextSlide();
      }
    });

    // 触摸滑动支持
    let touchStartX = 0;
    let touchEndX = 0;
    const bannerSection = document.querySelector('.hero-banner');

    if (bannerSection) {
      bannerSection.addEventListener('touchstart', function(e) {
        touchStartX = e.changedTouches[0].screenX;
      }, { passive: true });

      bannerSection.addEventListener('touchend', function(e) {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
      }, { passive: true });

      function handleSwipe() {
        if (slides.length <= 1) return;
        const swipeThreshold = 50;
        if (touchEndX < touchStartX - swipeThreshold) {
          nextSlide();
        } else if (touchEndX > touchStartX + swipeThreshold) {
          prevSlide();
        }
      }
    }
  </script>
</body>
</html>
