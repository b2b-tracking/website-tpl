<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" th:content="${siteSeo != null ? siteSeo.description : ''}" content="查看我們的全部產品系列">
  <meta name="keywords" th:content="${siteSeo != null ? siteSeo.keywords : ''}" content="">
  <title th:with="currentMenu=${menus != null ? menus.^[target_url == 'products'] : null}"
         th:text="${(currentMenu != null ? currentMenu.menu_name + ' - ' : '') + (siteSeo != null ? siteSeo.title : site.name)}">產品中心 - ManufacturePro</title>
  <link rel="icon" th:if="${site.favicon}" th:href="@{${site.favicon}}" type="image/x-icon">
  <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body>
  <!-- 導航欄 -->
  <nav class="navbar">
    <div class="nav-container">
      <a th:href="@{'/' + ${lang} + '/'}" class="logo">
        <img th:if="${site != null and site.logo != null and !site.logo.isEmpty()}" th:src="@{${site.logo}}" th:alt="${site.name}" style="height: 40px; vertical-align: middle;">
        <img th:if="${site == null or site.logo == null or site.logo.isEmpty()}" src="/upload/images/2026/04/29/9be2d0c3-c5aa-4d3c-b616-2f7e4728a653.png" th:src="@{/upload/images/2026/04/29/9be2d0c3-c5aa-4d3c-b616-2f7e4728a653.png}" alt="logo" style="height: 40px; vertical-align: middle;">
        <span th:unless="${site.logo}" th:text="${site.name}">ManufacturePro</span>
      </a>
      <button class="mobile-menu-toggle">☰</button>
      <ul class="nav-menu">
        <li th:each="menu : ${menus}">
          <a th:href="@{'/' + ${lang} + '/' + ${menu.target_url}}" class="nav-link"
             th:text="${menu.menu_name}">菜單</a>
        </li>
       
      </ul>
    </div>
  </nav>

  <!-- 產品列表 -->
  <section class="container" style="margin-top: 3rem;">
    <h2 class="section-title" data-i18n="products.title">我們的產品</h2>
    <p class="section-subtitle" data-i18n="products.subtitle"></p>

    <!-- 分類篩選 -->
    <div style="margin: 2rem 0; display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
      <a th:href="@{'/' + ${lang} + '/products'}"
         th:classappend="${selectedCategory == null} ? 'active'"
         class="category-filter-btn"
         data-i18n="products.allProducts">
        全部產品
      </a>
      <a th:each="cat : ${categories}"
         th:href="@{'/' + ${lang} + '/products?category=' + ${cat.id}}"
         th:classappend="${selectedCategory != null && selectedCategory == cat.id} ? 'active'"
         class="category-filter-btn"
         th:text="${cat.name}">
        分類
      </a>
    </div>

    <div class="products-grid" id="products-container" style="margin-top: 3rem;">
      <div th:each="product, iterStat : ${products}" class="product-card"
           th:onclick="'window.location.href=\'' + @{'/' + ${lang} + '/products/' + ${product.id}} + '\''">
        <div class="product-image" th:if="${product.mainImage}"
             th:style="'background-image: url(' + ${product.mainImage} + '); background-size: contain; background-position: center; background-repeat: no-repeat;'">
        </div>
        <div class="product-image" th:unless="${product.mainImage}"
             th:style="'background: linear-gradient(135deg, hsl(' + ${(iterStat.index * 60) % 360} + ', 70%, 60%) 0%, hsl(' + ${((iterStat.index * 60) + 30) % 360} + ', 70%, 50%) 100%);'">
          <span>📦</span>
        </div>
        <div class="product-info">
          <h3 class="product-title" th:text="${product.name}">產品名稱</h3>
          <p class="product-description" th:text="${product.shortDescription}">產品簡介</p>
          <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
            <a th:href="@{'/' + ${lang} + '/products/' + ${product.id}}" class="btn btn-outline" style="flex: 1;" data-i18n="products.viewDetails" onclick="event.stopPropagation()">查看詳情</a>
            <a th:href="@{'/' + ${lang} + '/#contact'}" class="btn" style="flex: 1;" data-i18n="products.getQuote" onclick="event.stopPropagation()">獲取報價</a>
          </div>
        </div>
      </div>
    </div>

    <!-- 空狀態 -->
    <div th:if="${products == null || products.isEmpty()}" style="text-align: center; padding: 4rem 0;">
      <p style="color: var(--text-light); font-size: 1.2rem;" data-i18n="products.noProducts">暫無產品</p>
    </div>

    <!-- 分頁 -->
    <div th:if="${totalPages > 1}" style="display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 3rem;">
      <a th:if="${currentPage > 1}"
         th:href="${selectedCategory != null} ? @{/} + ${lang} + '/products?page=' + ${currentPage - 1} + '&category=' + ${selectedCategory} : @{/} + ${lang} + '/products?page=' + ${currentPage - 1}"
         class="pagination-btn">&lt;</a>

      <span th:each="i : ${#numbers.sequence(1, totalPages)}"
            th:if="${i == 1 || i == totalPages || (i >= currentPage - 2 && i <= currentPage + 2)}">
        <a th:if="${i != currentPage}"
           th:href="${selectedCategory != null} ? @{/} + ${lang} + '/products?page=' + ${i} + '&category=' + ${selectedCategory} : @{/} + ${lang} + '/products?page=' + ${i}"
           class="pagination-btn"
           th:text="${i}">1</a>
        <span th:if="${i == currentPage}"
              class="pagination-btn active"
              th:text="${i}">1</span>
      </span>

      <a th:if="${currentPage < totalPages}"
         th:href="${selectedCategory != null} ? @{/} + ${lang} + '/products?page=' + ${currentPage + 1} + '&category=' + ${selectedCategory} : @{/} + ${lang} + '/products?page=' + ${currentPage + 1}"
         class="pagination-btn">&gt;</a>
    </div>
  </section>

  <!-- 頁腳 -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section">
        <img th:if="${site != null and site.logo != null and !site.logo.isEmpty()}" th:src="@{${site.logo}}" th:alt="${site.name}" style="height: 7rem; vertical-align: middle;">
        <img th:if="${site == null or site.logo == null or site.logo.isEmpty()}" src="/upload/images/2026/04/29/3994398d-6c98-4f56-a700-989e75b9e0d9.png" th:src="@{/upload/images/2026/04/29/3994398d-6c98-4f56-a700-989e75b9e0d9.png}" alt="logo" style="height: 7rem; vertical-align: middle;">
        <p th:text="${siteI18n != null ? siteI18n.description : ''}">我們是一家專注於創新產品研發和製造的企業，致力於爲全球客戶提供高品質的產品和服務。</p>
      </div>

      <div class="footer-section">
        <h3 data-i18n="products.title">產品中心</h3>
        <a th:each="category : ${categories}"
           th:href="@{'/' + ${lang} + '/products?category=' + ${category.id}}"
           th:text="${category.name}">產品分類</a>
      </div>

      <div class="footer-section">
        <h3 data-i18n="footer.quickLinks">快速鏈接</h3>
        <a th:href="@{'/' + ${lang} + '/about'}"><span data-i18n="nav.about">關於我們</span></a>
        <a th:href="@{'/' + ${lang} + '/news'}"><span data-i18n="nav.news">新聞資訊</span></a>
        <a href="#contact"><span data-i18n="nav.contact">聯繫我們</span></a>
      </div>

      <div class="footer-section" th:if="${contact}">
        <h3 data-i18n="contact.title">聯繫我們</h3>
        <p th:if="${contact.address}">📍 <span th:text="${contact.address}">中國廣東省深圳市</span></p>
        <p th:if="${contact.phone}">📞 <span th:text="${contact.phone}">+86 755-1234-5678</span></p>
        <p th:if="${contact.email}">✉️ <span th:text="${contact.email}">sales@manufacturepro.com</span></p>
      </div>
    </div>

    <div class="footer-bottom">
      <p>&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> <span th:text="${siteI18n != null ? siteI18n.site_name : ''}">ManufacturePro</span>. <span data-i18n="footer.allRightsReserved">保留所有權利</span></p>
      <p th:if="${site.icpNumber}" th:text="${site.icpNumber}"></p>
    </div>
  </footer>

  <!-- 返回顶部按钮 -->
  <div class="back-to-top">↑</div>

  <style>
    .category-filter-btn {
      padding: 0.5rem 1.5rem;
      border: 2px solid var(--primary-color);
      border-radius: 25px;
      text-decoration: none;
      color: var(--primary-color);
      transition: all 0.3s;
      background: white;
      font-weight: 500;
      display: inline-block;
    }
    .category-filter-btn:hover {
      background: var(--primary-color);
      color: white !important;
    }
    .category-filter-btn.active {
      background: var(--primary-color);
      color: white !important;
    }

    .pagination-btn {
      padding: 0.5rem 1rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      text-decoration: none;
      color: var(--text-color);
      background: white;
      transition: all 0.3s;
      min-width: 40px;
      text-align: center;
      display: inline-block;
    }
    .pagination-btn:hover {
      background: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }
    .pagination-btn.active {
      background: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
      font-weight: bold;
    }
  </style>

  <!-- 脚本 -->
  <script th:src="@{'/js/i18n.js'}"></script>
  <script th:src="@{'/js/main.js'}"></script>
</body>
</html>
