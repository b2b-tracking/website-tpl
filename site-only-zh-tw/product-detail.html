<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" th:content="${product.shortDescription}" content="產品詳細信息">
  <title th:text="${product.name} + ' - ' + ${siteSeo != null ? siteSeo.title : site.name}">產品詳情 - ManufacturePro</title>
  <link rel="icon" th:if="${site.favicon}" th:href="@{${site.favicon}}" type="image/x-icon">
  <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body>
  <!-- 導航欄 -->
  <nav class="navbar">
    <div class="nav-container">
      <a th:href="@{'/' + ${lang} + '/'}" class="logo">
        <img th:if="${site != null and site.logo != null and !site.logo.isEmpty()}" th:src="@{${site.logo}}" th:alt="${site.name}" style="height: 40px; vertical-align: middle;">
        <img th:if="${site == null or site.logo == null or site.logo.isEmpty()}" src="/upload/images/2026/04/29/fdec45bb-4865-46c7-8f7c-f35a5f5375c4.png" th:src="@{/upload/images/2026/04/29/fdec45bb-4865-46c7-8f7c-f35a5f5375c4.png}" alt="logo" style="height: 40px; vertical-align: middle;">
        <span th:unless="${site.logo}" th:text="${site.name}">ManufacturePro</span>
      </a>
      <button class="mobile-menu-toggle">☰</button>
      <ul class="nav-menu">
        <li th:each="menu : ${menus}">
          <a th:href="@{'/' + ${lang} + '/' + ${menu.target_url}}" class="nav-link"
             th:text="${menu.menu_name}">菜單</a>
        </li>
       
      </ul>
    </div>
  </nav>

  <!-- 產品詳情 -->
  <section class="product-detail" style="margin-top: 0;">
    <div class="container" style="margin-top: 6rem;">
      <!-- 返回按鈕 -->
      <div style="margin-bottom: 2rem;">
        <a th:href="@{'/' + ${lang} + '/products'}" class="btn btn-outline">
          <span>← </span><span data-i18n="productDetail.backToProducts">返回產品列表</span>
        </a>
      </div>

      <!-- 產品主要信息 -->
      <div class="product-detail-container">
        <div class="product-detail-image">
          <img th:if="${product.mainImage}" th:src="${product.mainImage}" alt="Product Image" style="width: 100%; height: 100%; object-fit: cover;">
          <span th:unless="${product.mainImage}" style="font-size: 8rem;">📦</span>
        </div>

        <div class="product-detail-info">
          <h1 th:text="${product.name}">產品名稱</h1>

          <!-- 產品屬性 -->
          <div th:if="${product.attributes != null && !product.attributes.isEmpty()}" style="margin: 1.5rem 0; padding: 1.5rem; background: #f8f9fa; border-radius: 8px;">
            <div th:each="attr, iterStat : ${product.attributes}" style="display: flex; padding: 0.5rem 0;" th:style="${!iterStat.last} ? 'display: flex; padding: 0.5rem 0; border-bottom: 1px solid #e9ecef;' : 'display: flex; padding: 0.5rem 0;'">
              <div style="min-width: 100px; font-weight: 600; color: var(--text-color);" th:text="${attr.name} + '：'">屬性名：</div>
              <div style="flex: 1; color: var(--text-light);" th:text="${attr.value}">屬性值</div>
            </div>
          </div>

          <div class="action-buttons">
            <a th:href="@{'/' + ${lang} + '/#contact'}" class="btn" data-i18n="productDetail.inquire">立即諮詢</a>
            <a th:href="@{'/' + ${lang} + '/products'}" class="btn btn-outline" data-i18n="productDetail.viewMore">查看更多產品</a>
          </div>
        </div>
      </div>

      <!-- 產品圖片展示 -->
      <div th:if="${product.images != null && !product.images.isEmpty()}" style="margin-top: 4rem;">
        <h2 class="section-title" data-i18n="productDetail.gallery">產品展示</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 2rem;">
          <div th:each="image : ${product.images}" style="height: 300px; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-lg);">
            <img th:src="${image}" alt="Product Image" style="width: 100%; height: 100%; object-fit: cover;">
          </div>
        </div>
      </div>

      <!-- 產品詳細描述 -->
      <div th:if="${product.description != null && !#strings.isEmpty(product.description)}" style="margin-top: 4rem;">
        <h2 class="section-title" data-i18n="productDetail.description">產品詳情</h2>
        <div class="rich-text-content" style="margin-top: 2rem;" th:utext="${product.description}">
          產品詳細描述內容
        </div>
      </div>
    </div>
  </section>

  <style>
    .rich-text-content {
      width: 100%;
      overflow: hidden;
    }
    .rich-text-content img {
      max-width: 100% !important;
      width: 100% !important;
      height: auto !important;
      display: block;
    }
    .rich-text-content p {
      margin: 1rem 0;
      max-width: 100%;
    }
    .rich-text-content p img {
      max-width: 100% !important;
      width: 100% !important;
      height: auto !important;
    }
    .rich-text-content figure,
    .rich-text-content .image {
      width: 100% !important;
      max-width: 100% !important;
    }
  </style>

  <!-- 頁腳 -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section">
        <img th:if="${site != null and site.logo != null and !site.logo.isEmpty()}" th:src="@{${site.logo}}" th:alt="${site.name}" style="height: 40px; vertical-align: middle;margin-bottom: 1rem;">
        <img th:if="${site == null or site.logo == null or site.logo.isEmpty()}" src="/upload/images/2026/04/29/fdec45bb-4865-46c7-8f7c-f35a5f5375c4.png" th:src="@{/upload/images/2026/04/29/fdec45bb-4865-46c7-8f7c-f35a5f5375c4.png}" alt="logo" style="height: 40px; vertical-align: middle;">
        <p th:text="${siteI18n != null ? siteI18n.description : ''}">我們是一家專注於創新產品研發和製造的企業，致力於爲全球客戶提供高品質的產品和服務。</p>
      </div>

      <div class="footer-section">
        <h3 data-i18n="products.title">產品中心</h3>
        <a th:each="category : ${categories}"
           th:href="@{'/' + ${lang} + '/products?category=' + ${category.id}}"
           th:text="${category.name}">產品分類</a>
      </div>

      <div class="footer-section">
        <h3 data-i18n="footer.quickLinks">快速鏈接</h3>
        <a th:href="@{'/' + ${lang} + '/about'}"><span data-i18n="nav.about">關於我們</span></a>
        <a th:href="@{'/' + ${lang} + '/news'}"><span data-i18n="nav.news">新聞資訊</span></a>
        <a href="#contact"><span data-i18n="nav.contact">聯繫我們</span></a>
      </div>

      <div class="footer-section" th:if="${contact}">
        <h3 data-i18n="contact.title">聯繫我們</h3>
        <p th:if="${contact.address}">📍 <span th:text="${contact.address}">中國廣東省深圳市</span></p>
        <p th:if="${contact.phone}">📞 <span th:text="${contact.phone}">+86 755-1234-5678</span></p>
        <p th:if="${contact.email}">✉️ <span th:text="${contact.email}">sales@manufacturepro.com</span></p>
      </div>
    </div>

    <div class="footer-bottom">
      <p>&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> <span th:text="${siteI18n != null ? siteI18n.site_name : ''}">ManufacturePro</span>. <span data-i18n="footer.allRightsReserved">保留所有權利</span></p>
      <p th:if="${site.icpNumber}" th:text="${site.icpNumber}"></p>
    </div>
  </footer>

  <!-- 返回頂部按鈕 -->
  <div class="back-to-top">↑</div>

  <!-- 腳本 -->
  <script th:src="@{'/js/i18n.js'}"></script>
  <script th:src="@{'/js/main.js'}"></script>
</body>
</html>
