<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" th:content="${siteSeo != null ? siteSeo.description : ''}" content="公司新聞和行業資訊">
  <meta name="keywords" th:content="${siteSeo != null ? siteSeo.keywords : ''}" content="">
  <title th:with="currentMenu=${menus != null ? menus.^[target_url == 'news'] : null}"
         th:text="${(currentMenu != null ? currentMenu.menu_name + ' - ' : '') + (siteSeo != null ? siteSeo.title : site.name)}">新聞資訊 - ManufacturePro</title>
  <link rel="icon" th:if="${site.favicon}" th:href="@{${site.favicon}}" type="image/x-icon">
  <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body>
  <!-- 導航欄 -->
  <nav class="navbar">
    <div class="nav-container">
      <a th:href="@{'/' + ${lang} + '/'}" class="logo">
        <img th:if="${site != null and site.logo != null and !site.logo.isEmpty()}" th:src="@{${site.logo}}" th:alt="${site.name}" style="height: 40px; vertical-align: middle;">
        <img th:if="${site == null or site.logo == null or site.logo.isEmpty()}" src="/upload/images/2026/04/29/9be2d0c3-c5aa-4d3c-b616-2f7e4728a653.png" th:src="@{/upload/images/2026/04/29/9be2d0c3-c5aa-4d3c-b616-2f7e4728a653.png}" alt="logo" style="height: 40px; vertical-align: middle;">
        <span th:unless="${site.logo}" th:text="${site.name}">ManufacturePro</span>
      </a>
      <button class="mobile-menu-toggle">☰</button>
      <ul class="nav-menu">
        <li th:each="menu : ${menus}">
          <a th:href="@{'/' + ${lang} + '/' + ${menu.target_url}}" class="nav-link"
             th:text="${menu.menu_name}">菜單</a>
        </li>
       
      </ul>
    </div>
  </nav>

  <!-- 新聞列表 -->
  <section class="container" style="margin-top: 6rem;">
    <h2 class="section-title" data-i18n="news.title">新聞資訊</h2>
    <p class="section-subtitle" data-i18n="news.subtitle">瞭解公司動態和行業資訊</p>

    <!-- 新聞網格 -->
    <div class="news-grid" style="margin-top: 3rem;">
      <div th:each="newsItem, iterStat : ${newsList}" class="news-card"
           th:onclick="'window.location.href=\'' + @{'/' + ${lang} + '/news/' + ${newsItem.id}} + '\''">
        <div class="news-image"
             th:if="${newsItem.cover_image}"
             th:style="'background-image: url(' + @{${newsItem.cover_image}} + '); background-size: contain; background-position: center; background-repeat: no-repeat;'">
        </div>
        <div class="news-image" th:unless="${newsItem.cover_image}"
             th:style="'background: linear-gradient(135deg, hsl(' + ${(iterStat.index * 120) % 360} + ', 70%, 60%) 0%, hsl(' + ${((iterStat.index * 120) + 50) % 360} + ', 70%, 50%) 100%);'">
          <span>📰</span>
        </div>
        <div class="news-info">
          <h3 class="news-title" th:text="${newsItem.title}">新聞標題</h3>
          <p class="news-excerpt" th:text="${newsItem.summary}">
            新聞摘要...
          </p>
          <div class="news-meta">
            <span class="news-date">📅 <span class="utc-date" th:attr="data-utc=${newsItem.publish_time}" th:text="${#temporals.format(newsItem.publish_time, 'yyyy-MM-dd')}">2026-01-10</span></span>
            <span class="news-views" th:if="${newsItem.view_count != null}" th:text="'👁 ' + ${newsItem.view_count}">👁 1258</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 空狀態 -->
    <div th:if="${newsList == null || newsList.isEmpty()}" style="text-align: center; padding: 4rem 0;">
      <p style="color: var(--text-light); font-size: 1.2rem;">暫無新聞</p>
    </div>
  </section>

  <!-- 頁腳 -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section">
        <img th:if="${site != null and site.logo != null and !site.logo.isEmpty()}" th:src="@{${site.logo}}" th:alt="${site.name}" style="height: 7rem; vertical-align: middle;margin-bottom: 1rem;">
        <img th:if="${site == null or site.logo == null or site.logo.isEmpty()}" src="/upload/images/2026/04/29/3994398d-6c98-4f56-a700-989e75b9e0d9.png" th:src="@{/upload/images/2026/04/29/3994398d-6c98-4f56-a700-989e75b9e0d9.png}" alt="logo" style="height: 7rem; vertical-align: middle;">
        <p th:text="${siteI18n != null ? siteI18n.description : ''}">我們是一家專注於創新產品研發和製造的企業，致力於爲全球客戶提供高品質的產品和服務。</p>
      </div>

      <div class="footer-section">
        <h3 data-i18n="products.title">產品中心</h3>
        <a th:each="category : ${categories}"
           th:href="@{'/' + ${lang} + '/products?category=' + ${category.id}}"
           th:text="${category.name}">產品分類</a>
      </div>

      <div class="footer-section">
        <h3 data-i18n="footer.quickLinks">快速鏈接</h3>
        <a th:href="@{'/' + ${lang} + '/about'}"><span data-i18n="nav.about">關於我們</span></a>
        <a th:href="@{'/' + ${lang} + '/news'}"><span data-i18n="nav.news">新聞資訊</span></a>
        <a href="#contact"><span data-i18n="nav.contact">聯繫我們</span></a>
      </div>

      <div class="footer-section" th:if="${contact}">
        <h3 data-i18n="contact.title">聯繫我們</h3>
        <p th:if="${contact.address}">📍 <span th:text="${contact.address}">中國廣東省深圳市</span></p>
        <p th:if="${contact.phone}">📞 <span th:text="${contact.phone}">+86 755-1234-5678</span></p>
        <p th:if="${contact.email}">✉️ <span th:text="${contact.email}">sales@manufacturepro.com</span></p>
      </div>
    </div>

    <div class="footer-bottom">
      <p>&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> <span th:text="${siteI18n != null ? siteI18n.site_name : ''}">ManufacturePro</span>. <span data-i18n="footer.allRightsReserved">保留所有權利</span></p>
      <p th:if="${site.icpNumber}" th:text="${site.icpNumber}"></p>
    </div>
  </footer>

  <!-- 返回頂部按鈕 -->
  <div class="back-to-top">↑</div>

  <!-- 腳本 -->
  <script th:src="@{'/js/i18n.js'}"></script>
  <script th:src="@{'/js/main.js'}"></script>
</body>
</html>
