<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" th:content="${news.summary}" content="新聞詳情">
  <title th:text="${news.title} + ' - ' + ${siteSeo != null ? siteSeo.title : site.name}">新聞詳情 - ManufacturePro</title>
  <link rel="icon" th:if="${site.favicon}" th:href="@{${site.favicon}}" type="image/x-icon">
  <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body>
  <!-- 導航欄 -->
  <nav class="navbar">
    <div class="nav-container">
      <a th:href="@{'/' + ${lang} + '/'}" class="logo">
        <img th:if="${site != null and site.logo != null and !site.logo.isEmpty()}" th:src="@{${site.logo}}" th:alt="${site.name}" style="height: 40px; vertical-align: middle;">
        <img th:if="${site == null or site.logo == null or site.logo.isEmpty()}" src="./images/logo.png" th:src="@{/images/logo.png}" alt="logo" style="height: 40px; vertical-align: middle;">
        <span th:unless="${site.logo}" th:text="${site.name}">ManufacturePro</span>
      </a>
      <button class="mobile-menu-toggle">☰</button>
      <ul class="nav-menu">
        <li th:each="menu : ${menus}">
          <a th:href="@{'/' + ${lang} + '/' + ${menu.target_url}}" class="nav-link"
             th:text="${menu.menu_name}">菜單</a>
        </li>
       
      </ul>
    </div>
  </nav>

  <!-- 新聞詳情 -->
  <section class="container" style="margin-top: 6rem;">
    <div style="max-width: 900px; margin: 0 auto;">
      <!-- 返回按鈕 -->
      <div style="margin-bottom: 2rem;">
        <a th:href="@{'/' + ${lang} + '/news'}" class="btn btn-outline">← 返回新聞列表</a>
      </div>

      <!-- 新聞標題 -->
      <h2 class="section-title" th:text="${news.title}">新聞標題</h2>

      <!-- 元信息 -->
      <div style="text-align: center; color: var(--text-light); margin-bottom: 2rem;">
        <span>📅 <span class="utc-date" th:attr="data-utc=${news.publish_time}" th:text="${#temporals.format(news.publish_time, 'yyyy-MM-dd')}">2026-01-10</span></span>
        <span th:if="${news.view_count != null}" style="margin-left: 2rem;">👁️ 閱讀量: <span th:text="${news.view_count}">1258</span></span>
      </div>

      <!-- 封面圖片 -->
      <div th:if="${news.cover_image}" style="margin: 2rem 0; text-align: center;">
        <img th:src="@{${news.cover_image}}" alt="News Cover" style="max-width: 100%; height: auto;">
      </div>

      <!-- 新聞內容 -->
      <div class="news-detail-content" style="color: var(--text-light); line-height: 1.8; margin-top: 3rem;" th:utext="${news.content}">
        <p>新聞內容...</p>
      </div>
    </div>
  </section>

  <!-- 頁腳 -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section">
        <img th:if="${site != null and site.logo != null and !site.logo.isEmpty()}" th:src="@{${site.logo}}" th:alt="${site.name}" style="height: 40px; vertical-align: middle;margin-bottom: 1rem;">
        <img th:if="${site == null or site.logo == null or site.logo.isEmpty()}" src="./images/logo.png" th:src="@{/images/logo.png}" alt="logo" style="height: 40px; vertical-align: middle; margin-bottom: 1rem;">
        <p th:text="${siteI18n != null ? siteI18n.description : ''}">我們是一家專注於創新產品研發和製造的企業，致力於爲全球客戶提供高品質的產品和服務。</p>
      </div>

      <div class="footer-section">
        <h3 data-i18n="products.title">產品中心</h3>
        <a th:each="category : ${categories}"
           th:href="@{'/' + ${lang} + '/products?category=' + ${category.id}}"
           th:text="${category.name}">產品分類</a>
      </div>

      <div class="footer-section">
        <h3 data-i18n="footer.quickLinks">快速鏈接</h3>
        <a th:href="@{'/' + ${lang} + '/about'}"><span data-i18n="nav.about">關於我們</span></a>
        <a th:href="@{'/' + ${lang} + '/news'}"><span data-i18n="nav.news">新聞資訊</span></a>
        <a href="#contact"><span data-i18n="nav.contact">聯繫我們</span></a>
      </div>

      <div class="footer-section" th:if="${contact}">
        <h3 data-i18n="contact.title">聯繫我們</h3>
        <p th:if="${contact.address}">📍 <span th:text="${contact.address}">中國廣東省深圳市</span></p>
        <p th:if="${contact.phone}">📞 <span th:text="${contact.phone}">+86 755-1234-5678</span></p>
        <p th:if="${contact.email}">✉️ <span th:text="${contact.email}">sales@manufacturepro.com</span></p>
      </div>
    </div>

    <div class="footer-bottom">
      <p>&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> <span th:text="${siteI18n != null ? siteI18n.site_name : ''}">ManufacturePro</span>. <span data-i18n="footer.allRightsReserved">保留所有權利</span></p>
      <p th:if="${site.icpNumber}" th:text="${site.icpNumber}"></p>
    </div>
  </footer>

  <!-- 返回頂部按鈕 -->
  <div class="back-to-top">↑</div>

  <!-- 腳本 -->
  <script th:src="@{'/js/i18n.js'}"></script>
  <script th:src="@{'/js/main.js'}"></script>
</body>
</html>
